<div class="card p-6">
  <!-- Header Row: Stock In + Buttons -->
  <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
    <span class="block text-surface-900 font-bold text-2xl">Customer Due</span>
    
    <!-- Buttons - Hidden on mobile, shown in header on desktop -->
    <div class="hidden md:flex gap-4">
      <button pButton type="submit" label="Display" class="p-button-warning" 
        (click)="Onreturndropdowndetails()">
      </button>
      <button  pButton type="button" label="Write Off" class="p-button-warning" (click)="writeoff()" [disabled]="submitDisable"></button>
      <button pButton type="button" label="Download" icon="pi pi-download" iconPos="right" 
        class="p-button-warning" (click)="onDownloadClick()">
      </button>
      <button pButton type="button" label="Reset" 
        class="p-button-secondary" (click)="reset()">
      </button>
    </div>
  </div>

  <form [formGroup]="customerForm" class="space-y-8">

      <div class="grid grid-cols-1 md:grid-cols-4 gap-x-8 gap-y-4 w-full">
                <!-- Transaction Date From-->
                <div class="flex flex-col">
                    <label class="font-medium mb-1">From Date <span class="text-red-500">*</span></label>
                    <p-datepicker fluid formControlName="fromDate" dateFormat="dd/mm/yy" [showIcon]="true" placeholder="From Date" class="w-full"> </p-datepicker>
                </div>

                <!-- Transaction Date To -->
                <div class="flex flex-col">
                    <label class="font-medium mb-1">To Date <span class="text-red-500">*</span></label>
                    <p-datepicker fluid formControlName="toDate" dateFormat="dd/mm/yy" [showIcon]="true" placeholder="To Date" class="w-full"> </p-datepicker>
                    <small class="text-red-500 ms-3 mt-1" *ngIf="customerForm.get('toDate')?.touched">
                        <span *ngIf="customerForm.errors?.['dateRangeInvalid'] && customerForm.get('toDate')?.touched"> To Date must be greater than or equal to From Date </span>
                    </small>
                </div>

                <!-- Customer Name & Mobile -->
                <div class="flex flex-col">
                    <label class="font-medium mb-1">Customer Name & Mobile</label>
                    <p-dropdown
                        [options]="cusMobNameOptions"
                        optionValue="fieldid"
                        optionLabel="fieldvalue"
                        [filter]="true"
                        [showClear]="true"
                        filterPlaceholder="Search Customer Name & Mobile"
                        formControlName="p_cusname"
                        placeholder="Customer Name & Mobile"
                        class="w-full"
                    >
                    </p-dropdown>
                </div>
                 <!-- Total Due Amount -->
                <div class="flex flex-col">
                    <label class="font-medium mb-1">Total Due Amount</label>
                    <input pInputText placeholder="Total Due Amount" readonly class="grayout" formControlName="totalDueAmount" />
                </div>
                </div>

    <!-- Action Buttons - Visible only on mobile, below form fields -->
    <div class="flex md:hidden justify-center gap-2 mt-6">
      <button pButton type="submit" label="Display" class="p-button-warning flex-1" 
        (click)="Onreturndropdowndetails()" [disabled]="customerForm.invalid">
      </button>
       <button  pButton type="button" label="Write Off" class="p-button-warning flex-1" (click)="writeoff()" [disabled]="submitDisable"></button>
      <button pButton type="button" label="Download"
        class="p-button-warning flex-1" (click)="onDownloadClick()">
      </button>
      <button pButton type="button" label="Reset" 
        class="p-button-secondary flex-1" (click)="reset()">
      </button>
    </div>

    <!-- Product Table with Pagination -->
    <div>
      <p-table
        [value]="filteredProducts"
        dataKey="customerphone"
        [(selection)]="selectedRows"
        selectionMode="multiple"
        [tableStyle]="{'min-width': '50rem'}"
        [paginator]="true"
        [rows]="10"        
[rowsPerPageOptions]="[10, 20, 50]"
        [responsiveLayout]="'scroll'"
        class="p-datatable-gridlines mt-6 customer-due"
      >
        <ng-template pTemplate="header">
          <tr class="bg-yellow-400">
            <th>Name</th>
            <th>Mobile</th>
            <th>Due Amount</th>
            <th>Write Off</th>
            <th>Status</th>
            <th>Reason</th>
            <!-- <th>Select</th> -->
          </tr>
        </ng-template>

        <ng-template pTemplate="body" let-row let-i="rowIndex">
          <tr>
            <td>{{ row.customer}}</td>
            <td>{{ row.customerphone }}</td>
            <td>{{row.due_amount}}</td>
            <td style="width: 140px; min-width: 160px; max-width: 160px">
                            <div class="grid items-center gap-2">
                                <input
                                    type="number"
                                    class="w-full"
                                    pInputText
                                    [(ngModel)]="row.write_off"
                                    (ngModelChange)="updatewriteoff(i, $event)"
                                    [ngModelOptions]="{ standalone: true }"
                                    (input)="validateWriteoffAmount(row)"
                                    placeholder="Amount"
                                    (keydown)="blockMinus($event)"
                                />
                                <small class="text-red-500" *ngIf="row.amountError"> This cannot be greater than {{ row.due_amount }} </small>
                            </div>
                        </td>
                        <td></td>
                        <td></td>
           <!-- <td><p-tableCheckbox [value]="row"></p-tableCheckbox></td> -->
          </tr>
        </ng-template>

        <ng-template pTemplate="paginatorleft" appendTo="body">
          <div class="total-items text-gray-600 ms-2">Total Items: {{ filteredProducts?.length || 0 }}</div>
        </ng-template>
      </p-table>
    </div>
  </form>
</div>
