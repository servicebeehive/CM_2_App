<div class="card p-6">
    <!-- Header Row: Stock In + Buttons -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
        <span class="block text-surface-900 font-bold text-2xl">Miscellaneous Charges</span>

        <!-- Buttons - Hidden on mobile, shown in header on desktop -->
        <div class="hidden md:flex gap-4">
            <button pButton type="submit" label="Submit" class="p-button-warning flex-1" (click)="submit()" [disabled]="customerForm.invalid"></button>
            <button pButton type="button" label="Display" class="p-button-warning" (click)="Onreturndropdowndetails()"></button>
            <button pButton type="button" label="Download" icon="pi pi-download" iconPos="right" class="p-button-warning" (click)="onDownloadClick()"></button>
            <button pButton type="button" label="Reset" class="p-button-secondary" (click)="reset()"></button>
        </div>
    </div>

    <form [formGroup]="customerForm" class="space-y-8">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-x-8 gap-y-4 w-full">
            <!-- Date From-->
            <div class="flex flex-col">
                <label class="font-medium mb-1">Date <span class="text-red-500">*</span></label>
                <p-datepicker fluid formControlName="curdate" dateFormat="dd/mm/yy" [showIcon]="true" placeholder="Date" class="w-full"> </p-datepicker>
            </div>

            <!-- Head -->
            <div class="flex flex-col">
                <label class="font-medium mb-1">Head</label>
                <p-dropdown [options]="headOptions" optionValue="fieldid" optionLabel="fieldname" [filter]="true" [showClear]="true" filterPlaceholder="Search head" formControlName="p_head" placeholder="Head" class="w-full"> </p-dropdown>
            </div>
            <!-- Amount -->
            <div class="flex flex-col">
                <label class="font-medium mb-1">Amount</label>
                <input pInputText type="number" min="1" placeholder="Amount" formControlName="p_amount" (keydown)="blockMinus($event)" />
                <small class="text-red-500" *ngIf="customerForm.controls['p_amount'].touched && customerForm.controls['p_amount'].errors?.['min']"> Amount must be greater than 0 </small>
                <small class="text-red-500" *ngIf="customerForm.controls['p_amount'].touched && customerForm.controls['p_amount'].errors?.['required']"> Amount is required </small>
            </div>
        </div>

        <!-- Action Buttons - Visible only on mobile, below form fields -->
        <div class="flex md:hidden justify-center gap-2 mt-6">
            <button pButton type="submit" label="Submit" class="p-button-warning flex-1" (click)="submit()"></button>
            <button pButton type="button" label="Display" class="p-button-warning flex-1" (click)="Onreturndropdowndetails()" [disabled]="customerForm.invalid"></button>
            <button pButton type="button" label="Download" class="p-button-warning flex-1" (click)="onDownloadClick()"></button>
            <button pButton type="button" label="Reset" class="p-button-secondary flex-1" (click)="reset()"></button>
        </div>

        <!-- Product Table with Pagination -->
        <div>
            <p-table
                [value]="filteredProducts"
                dataKey="mobile"
                [(selection)]="selectedRows"
                selectionMode="multiple"
                [tableStyle]="{ 'min-width': '50rem' }"
                [paginator]="true"
                [rows]="10"
                [rowsPerPageOptions]="[10, 20, 50]"
                [responsiveLayout]="'scroll'"
                class="p-datatable-gridlines mt-6 item-report"
            >
                <ng-template pTemplate="header">
                    <tr class="bg-yellow-400">
                        <th>Date</th>
                        <th>Head</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Reason</th>
                    </tr>
                </ng-template>

                <ng-template pTemplate="body" let-row let-i="rowIndex">
                    <tr>
                        <td>{{ row.date }}</td>
                        <td>{{ row.head }}</td>
                        <td>{{ row.amount }}</td>
                        <td>{{ row.status }}</td>
                        <td>{{ row.reason }}></td>
                    </tr>
                </ng-template>

                <ng-template pTemplate="paginatorleft" appendTo="body">
                    <div class="total-items text-gray-600 ms-2">Total Items: {{ filteredProducts?.length || 0 }}</div>
                </ng-template>
            </p-table>
        </div>
    </form>
</div>
